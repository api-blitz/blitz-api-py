name: Release

on:
  push:
    branches: [main]

# release-please needs to open/update its release PR and create releases.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    # Must match the trusted-publisher environment configured on PyPI.
    environment:
      name: pypi
      url: https://pypi.org/p/blitz-api-py
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing (no stored token).
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      # The only place CI hits the network for enums: refuse to publish a release
      # whose enums drifted from the live spec. Per-PR ci.yml stays offline.
      - name: Verify enums are in sync with the live API spec
        run: |
          uv run python scripts/gen_enums.py --fetch
          if ! git diff --quiet -- src/blitz_api/types/enums.py; then
            echo "::error::Committed enums are stale vs the live spec (https://api.blitz-api.ai/openapi). Run \`python scripts/gen_enums.py --fetch\`, commit src/blitz_api/types/enums.py + openapi/enum-source.json, then re-release."
            git --no-pager diff -- src/blitz_api/types/enums.py openapi/enum-source.json
            exit 1
          fi
          echo "Enums are in sync with the live spec."
      - name: Build sdist and wheel
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
